services:
  - type: web_service
    name: septic-backend-staging
    env: docker
    dockerfilePath: Dockerfile
    branch: main
    plan: starter
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
    # For secrets (DATABASE_URL, REDIS_URL, etc.) set them in Render dashboard after creating the service.
