name: Secrets Validation

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Validate Development Secrets
        if: github.ref == 'refs/heads/develop'
        working-directory: backend
        run: npm run validate-secrets -- --env development
        env:
          NODE_ENV: development
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: septik_db
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      
      - name: Validate Staging Secrets
        if: github.ref == 'refs/heads/staging'
        working-directory: backend
        run: npm run validate-secrets -- --env staging
        env:
          NODE_ENV: staging
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          DB_PORT: 5432
          DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          DB_USER: ${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.STAGING_REDIS_HOST }}
          REDIS_PORT: 6379
          REDIS_PASSWORD: ${{ secrets.STAGING_REDIS_PASSWORD }}
          STAGING_URL: ${{ secrets.STAGING_URL }}
          STAGING_WEBHOOK_SECRET: ${{ secrets.STAGING_WEBHOOK_SECRET }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          YOOKASSA_WEBHOOK_SECRET: ${{ secrets.YOOKASSA_WEBHOOK_SECRET }}
      
      - name: Validate Production Secrets
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: npm run validate-secrets -- --env production
        env:
          NODE_ENV: production
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          DB_HOST: ${{ secrets.PRODUCTION_DB_HOST }}
          DB_PORT: 5432
          DB_NAME: ${{ secrets.PRODUCTION_DB_NAME }}
          DB_USER: ${{ secrets.PRODUCTION_DB_USER }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
          REDIS_HOST: ${{ secrets.PRODUCTION_REDIS_HOST }}
          REDIS_PORT: 6379
          REDIS_PASSWORD: ${{ secrets.PRODUCTION_REDIS_PASSWORD }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          YOOKASSA_WEBHOOK_SECRET: ${{ secrets.YOOKASSA_WEBHOOK_SECRET }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ADMIN_URL: ${{ secrets.ADMIN_URL }}
      
      - name: Check for weak secrets
        working-directory: backend
        run: |
          echo "Checking for common weak patterns..."
          if echo "$JWT_SECRET" | grep -qi "change_me\|your_secret\|password\|123456"; then
            echo "❌ JWT_SECRET contains weak pattern"
            exit 1
          fi
          echo "✅ No weak patterns detected"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      
      - name: Validation Summary
        if: always()
        run: |
          echo "## 🔐 Secrets Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'development' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📖 See [Secrets Management Documentation](../docs/SECRETS_MANAGEMENT.md) for details" >> $GITHUB_STEP_SUMMARY

  check-secret-rotation:
    name: Check Secret Rotation Schedule
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Check last rotation date
        id: check-rotation
        run: |
          # Проверка файла с датой последней ротации
          if [ -f ".github/last-rotation.txt" ]; then
            LAST_ROTATION=$(cat .github/last-rotation.txt)
            DAYS_SINCE=$(( ($(date +%s) - $(date -d "$LAST_ROTATION" +%s)) / 86400 ))
            echo "days_since=$DAYS_SINCE" >> $GITHUB_OUTPUT
            
            if [ $DAYS_SINCE -gt 90 ]; then
              echo "⚠️ Секреты не ротировались $DAYS_SINCE дней (рекомендуется каждые 90 дней)"
              echo "rotation_needed=true" >> $GITHUB_OUTPUT
            else
              echo "✅ Последняя ротация: $DAYS_SINCE дней назад"
              echo "rotation_needed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ Файл с датой ротации не найден"
            echo "rotation_needed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Create rotation reminder issue
        if: steps.check-rotation.outputs.rotation_needed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔐 Напоминание: Ротация секретов';
            const body = `
            ## Требуется ротация секретов
            
            Прошло более 90 дней с последней ротации критических секретов.
            
            ### Секреты для ротации:
            - [ ] JWT_SECRET
            - [ ] JWT_REFRESH_SECRET
            - [ ] DB_PASSWORD
            - [ ] REDIS_PASSWORD
            - [ ] YOOKASSA_WEBHOOK_SECRET
            
            ### Инструкции:
            1. Запустите локально: \`npm run rotate-secrets -- --type all --dry-run\`
            2. Следуйте инструкциям в выводе скрипта
            3. Обновите секреты в GitHub Settings → Secrets
            4. Деплойте изменения
            5. Обновите дату в \`.github/last-rotation.txt\`
            
            📖 Документация: [docs/SECRETS_MANAGEMENT.md](../docs/SECRETS_MANAGEMENT.md)
            `;
            
            // Проверка существующих issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,secrets-rotation'
            });
            
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'secrets-rotation', 'high-priority']
              });
            }
