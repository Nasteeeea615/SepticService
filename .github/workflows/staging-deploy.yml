name: Staging Deploy (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (staging)'
        required: true
        default: 'staging'

jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      REMOTE_PROJECT_DIR: ${{ secrets.REMOTE_PROJECT_DIR }}
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts || true

      - name: Run remote staging deploy script
        run: |
          bash ./backend/scripts/staging-deploy.sh
